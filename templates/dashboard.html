{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Jobs</h2>
  {% if is_admin %}
    <p><a href="{{ url_for('create_job') }}"><button>Create Job</button></a></p>
    <p><a href="{{ url_for('admin_checklists') }}"><button>Checklist Templates</button></a></p>
  {% endif %}
  {% for job in jobs %}
    <div class="card">
      <h3>{{ job.job_number }} - {{ job.title }}
        <span class="badge status-{{ job.status }}">{{ job.status }}</span>
      </h3>
      <p>{{ job.client_name }} � {{ job.address }}</p>
      <p><a href="{{ url_for('view_job', job_id=job.id) }}">Open</a></p>
    </div>
  {% else %}
    <p>No jobs yet.</p>
  {% endfor %}
</div>
{% endblock %}
